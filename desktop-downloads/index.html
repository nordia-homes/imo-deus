<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Descarcă ImoDeus Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1e33;
        --panel: #152a47;
        --panel-border: rgba(255, 255, 255, 0.12);
        --text: #f8fafc;
        --muted: rgba(248, 250, 252, 0.72);
        --accent: #22c55e;
        --accent-hover: #16a34a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 28%),
          linear-gradient(180deg, #12243d 0%, var(--bg) 100%);
        color: var(--text);
      }

      .card {
        width: min(100%, 720px);
        padding: 40px;
        border-radius: 28px;
        border: 1px solid var(--panel-border);
        background: linear-gradient(180deg, rgba(21, 42, 71, 0.98), rgba(15, 30, 51, 0.98));
        box-shadow: 0 24px 80px rgba(3, 7, 18, 0.38);
      }

      .eyebrow {
        margin: 0 0 14px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(34, 197, 94, 0.88);
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 50px);
        line-height: 1.04;
      }

      p {
        margin: 18px 0 0;
        max-width: 560px;
        font-size: 18px;
        line-height: 1.65;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 28px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 56px;
        padding: 0 22px;
        border-radius: 16px;
        border: 1px solid transparent;
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
        transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button-primary {
        background: var(--accent);
        color: #052e16;
      }

      .button-primary:hover {
        background: var(--accent-hover);
      }

      .button-secondary {
        border-color: var(--panel-border);
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }

      .meta {
        margin-top: 26px;
        font-size: 14px;
        color: rgba(248, 250, 252, 0.58);
      }

      @media (max-width: 640px) {
        .card {
          padding: 28px 22px;
          border-radius: 22px;
        }

        p {
          font-size: 16px;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">ImoDeus Desktop</p>
      <h1>Descarcă aplicația desktop pentru Windows</h1>
      <p>
        Instalează versiunea desktop pentru fluxurile asistate de promovare Facebook și pentru un control mai
        bun al automatizărilor locale.
      </p>

      <div class="actions">
        <a class="button button-primary" href="/ImoDeus%20Desktop%20Setup%200.1.1.exe">
          Descarcă installer-ul
        </a>
        <a class="button button-secondary" href="/latest.yml">
          Vezi fișierul latest.yml
        </a>
      </div>

      <p class="meta">Versiune disponibilă: 0.1.1</p>
    </main>
  </body>
</html>
